# PruningContentFilter template. Quality-based markdown extraction (no query).
# Copy, fill, pass via `crwl <url> -f filter_pruning.yml -o markdown-fit`.
# Field reference: `references/cli-guide.md#content-filtering`.

type: "pruning"
threshold: 0.48               # 0.0 keeps everything; 1.0 prunes aggressively
threshold_type: "fixed"       # "fixed" or "dynamic"
